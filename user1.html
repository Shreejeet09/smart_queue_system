<!DOCTYPE html>
<html>
<head>
  <title>Smart Queue System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }

    .container {
      background: white;
      width: 350px;
      margin: 80px auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      background: #4facfe;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    .info {
      margin-top: 20px;
      font-size: 18px;
    }

    .token {
      font-size: 22px;
      font-weight: bold;
      color: #007bff;
    }

    .highlight {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Smart Queue System</h2>

    <button onclick="generateToken()">Get Token</button>

    <div class="info token" id="tokenDisplay"></div>
    <div class="info" id="currentToken">Current Token: None</div>
    <div class="info" id="position">Your Position: --</div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "smartqueuesystem-47b99.firebaseapp.com",
      databaseURL: "https://smartqueuesystem-47b99-default-rtdb.firebaseio.com/",
      projectId: "smartqueuesystem-47b99"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function generateToken() {
      let existingToken = localStorage.getItem("myToken");

      if (existingToken) {
        document.getElementById("tokenDisplay").innerText =
          "You already have Token: " + existingToken;
        return;
      }

      let tokenRef = db.ref("tokenNumber");

      tokenRef.transaction(function(currentValue) {
        return (currentValue || 100) + 1;
      }, function(error, committed, snapshot) {
        if (committed) {
          let tokenNumber = snapshot.val();
          let newToken = "A" + tokenNumber;

          db.ref("queue").push(newToken);
          localStorage.setItem("myToken", newToken);

          document.getElementById("tokenDisplay").innerText =
            "Your Token: " + newToken;
        }
      });
    }

    // Show current serving token
    db.ref("currentToken").on("value", snapshot => {
      let current = snapshot.val() || "None";

      document.getElementById("currentToken").innerText =
        "Current Token: " + current;
    });

    // Main queue logic (UPDATED PROFESSIONAL LOGIC)
    db.ref("queue").on("value", snapshot => {
      let data = snapshot.val();
      let myToken = localStorage.getItem("myToken");

      if (!myToken) {
        document.getElementById("position").innerText =
          "Your Position: --";
        return;
      }

      let tokens = data ? Object.values(data) : [];
      let position = tokens.indexOf(myToken);

      db.ref("currentToken").once("value", snap => {
        let current = snap.val();

        // CASE 1: Your turn completed
        if (current === myToken) {
          document.getElementById("position").innerHTML =
            "<span class='highlight'>Please proceed to counter</span>";

          // AUTO REMOVE TOKEN
          localStorage.removeItem("myToken");
          return;
        }

        // CASE 2: Token not in queue (already served)
        if (position === -1) {
          document.getElementById("position").innerText =
            "Your turn is completed";

          localStorage.removeItem("myToken");
          return;
        }

        // CASE 3: Still waiting
        let waitTime = (position + 1) * 2;

        document.getElementById("position").innerText =
          "Your Position: " + (position + 1) +
          " | Estimated Wait: " + waitTime + " mins";
      });
    });
  </script>

</body>
</html>
